<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>แด่คนพิเศษ ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

    <!-- หัวใจลอย -->
    <div id="hearts"></div>

    <!-- ================= HERO ================= -->

    <section class="hero">

        <img src="images/cover.jpg" class="cover">

        <div class="overlay">

            <h1 id="coupleName"></h1>

            <p id="quote"></p>

            <a href="#letter">

                <button>

                    เริ่มเรื่องราวของเรา ❤️

                </button>

            </a>

        </div>

    </section>

    <!-- ================= LETTER ================= -->

    <section id="letter" class="letter">

        <h2>

            💌 ถึงคนที่เรารัก

        </h2>

        <p id="loveLetter"></p>

    </section>

    <!-- ================= GALLERY ================= -->

    <section id="gallery">

        <h2>

            📸 ความทรงจำของเรา

        </h2>

        <div class="grid">

            <img src="images/1.jpg">

            <img src="images/2.jpg">

            <img src="images/3.jpg">

            <img src="images/4.jpg">

        </div>

    </section>

    <!-- ================= COUNTER ================= -->

    <section class="counter">

        <h2>

            เราอยู่ด้วยกันมาแล้ว

        </h2>

        <div id="days">

            0

        </div>

        <p>

            วัน ❤️

        </p>

    </section>

    <!-- ================= MUSIC ================= -->

    <section class="music">

        <h2>

            🎵 เพลงของเรา

        </h2>

        <audio controls>

            <source src="music/song.mp3" type="audio/mpeg">

        </audio>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        <h2>

            ❤️ Forever & Always ❤️

        </h2>

        <p>

            ขอบคุณที่เข้ามาเป็นความสุขของเรา

        </p>

    </footer>

    <!-- CONFIG -->
    <script src="config.js"></script>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
